name: Daily Corpus Collection

on:
  schedule:
    # Run daily at 4:30 AM UTC (10 AM IST)
    - cron: '30 4 * * *'
  workflow_dispatch:
    inputs:
      hf_limit:
        description: 'Limit docs from HuggingFace datasets'
        required: false
        default: '10000'
      wiki_limit:
        description: 'Limit Wikipedia articles'
        required: false
        default: '500'
      madurai_limit:
        description: 'Limit Project Madurai texts'
        required: false
        default: '50'

env:
  HF_REPO: mozhi-ai/tamil-corpus
  UV_SYSTEM_PYTHON: 1

jobs:
  collect-process-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      # --- Restore persistent state from HF repo ---
      - name: Restore pipeline state
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p corpus/raw/wikipedia corpus/raw/madurai corpus/dedup_index corpus/models

          # Download checkpoints and dedup state from HF repo
          for file in .meta/wikipedia-checkpoint.json .meta/madurai-checkpoint.json .meta/dedup-hashes.txt; do
            huggingface-cli download $HF_REPO "$file" \
              --local-dir corpus/state --quiet 2>/dev/null || true
          done

          # Place checkpoints where collectors expect them
          if [ -f corpus/state/.meta/wikipedia-checkpoint.json ]; then
            cp corpus/state/.meta/wikipedia-checkpoint.json corpus/raw/wikipedia/.checkpoint
            echo "Restored Wikipedia checkpoint"
          fi
          if [ -f corpus/state/.meta/madurai-checkpoint.json ]; then
            cp corpus/state/.meta/madurai-checkpoint.json corpus/raw/madurai/.checkpoint
            echo "Restored Madurai checkpoint"
          fi
          if [ -f corpus/state/.meta/dedup-hashes.txt ]; then
            cp corpus/state/.meta/dedup-hashes.txt corpus/dedup_index/hashes.txt
            echo "Restored dedup index ($(wc -l < corpus/dedup_index/hashes.txt) hashes)"
          fi

      # --- Download fastText model (cached) ---
      - name: Cache fastText model
        uses: actions/cache@v4
        with:
          path: corpus/models/lid.176.bin
          key: fasttext-lid176

      - name: Download fastText model
        if: ${{ !hashFiles('corpus/models/lid.176.bin') }}
        run: |
          mkdir -p corpus/models
          wget -q -O corpus/models/lid.176.bin \
            https://dl.fbaipublicfiles.com/fasttext/supervised-models/lid.176.bin
          echo "Downloaded fastText model ($(du -h corpus/models/lid.176.bin | cut -f1))"

      # --- Collect from all sources ---
      - name: Collect from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run mozhi collect --source huggingface \
            --limit ${{ github.event.inputs.hf_limit || '10000' }}

      - name: Collect from Wikipedia
        run: |
          uv run mozhi collect --source wikipedia \
            --limit ${{ github.event.inputs.wiki_limit || '500' }}

      - name: Collect from Project Madurai
        run: |
          uv run mozhi collect --source madurai \
            --limit ${{ github.event.inputs.madurai_limit || '50' }}

      # --- Process ---
      - name: Run processing pipeline
        run: uv run mozhi process

      # --- Publish ---
      - name: Publish to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run mozhi publish --repo $HF_REPO

      # --- Save persistent state back to HF repo ---
      - name: Save pipeline state
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p corpus/state/.meta

          # Save checkpoints
          [ -f corpus/raw/wikipedia/.checkpoint ] && \
            cp corpus/raw/wikipedia/.checkpoint corpus/state/.meta/wikipedia-checkpoint.json
          [ -f corpus/raw/madurai/.checkpoint ] && \
            cp corpus/raw/madurai/.checkpoint corpus/state/.meta/madurai-checkpoint.json

          # Save dedup hashes
          [ -f corpus/dedup_index/hashes.txt ] && \
            cp corpus/dedup_index/hashes.txt corpus/state/.meta/dedup-hashes.txt

          # Push state files to HF repo
          for file in corpus/state/.meta/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              huggingface-cli upload $HF_REPO "$file" ".meta/$filename" \
                --repo-type dataset --quiet 2>/dev/null || true
              echo "Saved $filename to HF repo"
            fi
          done

      # --- Job summary ---
      - name: Generate summary
        if: always()
        run: |
          echo "## 📊 Corpus Collection Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|---------|" >> $GITHUB_STEP_SUMMARY

          if ls corpus/raw/*/2026-*.jsonl 1>/dev/null 2>&1; then
            for f in corpus/raw/*/2026-*.jsonl; do
              source=$(basename $(dirname $f))
              count=$(wc -l < "$f" 2>/dev/null || echo "0")
              echo "| Raw ($source) | $count docs |" >> $GITHUB_STEP_SUMMARY
            done
          fi

          if ls corpus/processed/*.jsonl 1>/dev/null 2>&1; then
            PROCESSED=$(wc -l < corpus/processed/*.jsonl 2>/dev/null || echo "0")
            echo "| Processed | $PROCESSED docs |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Dataset: [mozhi-ai/tamil-corpus](https://huggingface.co/datasets/${{ env.HF_REPO }})" >> $GITHUB_STEP_SUMMARY
